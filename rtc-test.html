<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTC 连接测试</title>
    <script src="./vendor/live2d/pixi.min.js"></script>
    <script src="./vendor/live2d/live2d.min.js"></script>
    <script src="./vendor/live2d/cubism2.min.js"></script>
    <script src="./vendor/volcengine-rtc.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a2e;
            color: #eee;
        }
        h1 { color: #7c5cff; }
        .test-section {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid #0f3460;
        }
        .test-section h2 { color: #e94560; margin-top: 0; }
        button {
            background: #7c5cff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
        }
        button:hover { background: #6b4ee6; }
        button:disabled { background: #555; cursor: not-allowed; }
        .result {
            background: #0f3460;
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
            font-family: monospace;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }
        .success { border-left: 4px solid #4ade80; }
        .error { border-left: 4px solid #f87171; }
        .info { border-left: 4px solid #60a5fa; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <h1>🔧 RTC 连接测试</h1>

    <div class="test-section">
        <h2>步骤 1: API 连通性测试</h2>
        <button onclick="testApiConnectivity()">测试后端 API 连通性</button>
        <div id="api-result" class="result hidden"></div>
    </div>

    <div class="test-section">
        <h2>步骤 2: RTC Auth Token 获取测试</h2>
        <button onclick="testRtcToken()" id="btn-token" disabled>获取 RTC Token</button>
        <div id="token-result" class="result hidden"></div>
    </div>

    <div class="test-section">
        <h2>步骤 3: RTC SDK 检测</h2>
        <button onclick="testRtcSdk()">检测 RTC SDK</button>
        <div id="sdk-result" class="result hidden"></div>
    </div>

    <div class="test-section">
        <h2>步骤 4: 完整 RTC 连接测试</h2>
        <button onclick="testFullRtcConnection()" id="btn-connect" disabled>发起 RTC 连接</button>
        <div id="connect-result" class="result hidden"></div>
    </div>

    <script>
        const API_BASE_URL = 'http://127.0.0.1:8788';
        let currentToken = null;
        let currentRoomInfo = null;

        function showResult(id, html, type) {
            const el = document.getElementById(id);
            el.innerHTML = html;
            el.className = `result ${type}`;
            el.classList.remove('hidden');
        }

        async function testApiConnectivity() {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '测试中...';

            try {
                const response = await fetch(`${API_BASE_URL}/api/rtc/voice-chat/features`);
                const data = await response.json();

                if (response.ok && data.ok) {
                    showResult('api-result',
`✅ API 连通性测试成功！

状态码: ${response.status}
URL: ${API_BASE_URL}/api/rtc/voice-chat/features

返回数据:
${JSON.stringify(data, null, 2)}`, 'success');
                    document.getElementById('btn-token').disabled = false;
                } else {
                    throw new Error(data.message || 'API 返回错误');
                }
            } catch (error) {
                showResult('api-result',
`❌ API 连通性测试失败！

错误: ${error.message}

可能原因:
1. 后端服务未启动 (应在 ${API_BASE_URL})
2. 网络连接问题
3. CORS 跨域问题`, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '测试后端 API 连通性';
            }
        }

        async function testRtcSdk() {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '检测中...';

            try {
                const checks = [];

                checks.push(`window.VERTC: ${typeof window.VERTC !== 'undefined' ? '✅ 已加载' : '❌ 未加载'}`);

                if (typeof window.VERTC !== 'undefined') {
                    checks.push(`createEngine: ${typeof window.VERTC.createEngine === 'function' ? '✅ 可用' : '❌ 不可用'}`);
                    checks.push(`destroyEngine: ${typeof window.VERTC.destroyEngine === 'function' ? '✅ 可用' : '❌ 不可用'}`);
                }

                checks.push(`navigator.mediaDevices: ${typeof navigator.mediaDevices !== 'undefined' ? '✅ 可用' : '❌ 不可用'}`);

                if (typeof navigator.mediaDevices !== 'undefined') {
                    checks.push(`enumerateDevices: ${typeof navigator.mediaDevices.enumerateDevices === 'function' ? '✅ 可用' : '❌ 不可用'}`);
                }

                const result = checks.every(c => c.includes('✅'));
                showResult('sdk-result',
`${result ? '✅' : '⚠️'} RTC SDK 检测结果

${checks.join('\n')}

${result ? 'SDK 环境正常，可以进行 RTC 连接测试' : '部分 SDK 功能不可用，可能影响 RTC 功能'}`, result ? 'success' : 'info');
            } catch (error) {
                showResult('sdk-result', `❌ SDK 检测失败: ${error.message}`, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '检测 RTC SDK';
            }
        }

        async function testRtcToken() {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '获取中...';

            try {
                const runtime = {
                    apiBaseUrl: API_BASE_URL,
                    rtc: {
                        roomId: 'test-room-' + Date.now(),
                        userId: 'test-user-001',
                        appId: 'YOUR_APP_ID',
                        appKey: 'YOUR_APP_KEY'
                    }
                };

                const session = {
                    taskId: 'task-test-' + Date.now(),
                    features: null
                };

                showResult('token-result', '正在从后端获取 Token...', 'info');

                const response = await fetch(`${API_BASE_URL}/api/rtc/join`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        roomId: runtime.rtc.roomId,
                        userId: runtime.rtc.userId,
                        taskId: session.taskId
                    })
                });

                const data = await response.json();

                if (!response.ok || !data.ok) {
                    throw new Error(data.message || `HTTP ${response.status}`);
                }

                currentRoomInfo = data.data;
                currentToken = data.data.token;

                showResult('token-result',
`✅ Token 获取成功！

房间ID: ${currentRoomInfo.roomId}
用户ID: ${currentRoomInfo.userId}
AppID: ${currentRoomInfo.appId}
Token: ${currentToken.substring(0, 50)}...
TaskID: ${currentRoomInfo.taskId}

点击「发起 RTC 连接」继续测试`, 'success');

                document.getElementById('btn-connect').disabled = false;

            } catch (error) {
                showResult('token-result',
`❌ Token 获取失败！

错误: ${error.message}

可能原因:
1. 缺少正确的 RTC AppID/AppKey 配置
2. 后端服务异常
3. 网络问题`, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '获取 RTC Token';
            }
        }

        async function testFullRtcConnection() {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '连接中...';

            const resultEl = document.getElementById('connect-result');
            resultEl.innerHTML = '正在初始化 RTC Engine...';
            resultEl.className = 'result info';
            resultEl.classList.remove('hidden');

            try {
                if (typeof window.VERTC === 'undefined') {
                    throw new Error('RTC SDK 未加载');
                }

                if (!currentRoomInfo || !currentToken) {
                    throw new Error('请先获取 Token');
                }

                const engine = window.VERTC.createEngine(currentRoomInfo.appId);

                const statusLine = (msg) => {
                    resultEl.innerHTML += `\n${msg}`;
                    resultEl.scrollTop = resultEl.scrollHeight;
                };

                statusLine('✅ Engine 创建成功');

                engine.on('onRoomStateChanged', (state) => {
                    statusLine(`\n📡 房间状态变化: ${JSON.stringify(state)}`);
                });

                engine.on('onUserJoined', (user) => {
                    statusLine(`\n👤 用户加入: ${user.userId}`);
                });

                engine.on('onUserLeft', (user) => {
                    statusLine(`\n👤 用户离开: ${user.userId}`);
                });

                engine.on('onAudioDeviceStateChanged', (info) => {
                    statusLine(`\n🎤 音频设备变化: ${JSON.stringify(info)}`);
                });

                statusLine('🔄 正在加入房间...');

                await engine.startAudioCapture();

                statusLine('🎤 音频采集已启动');

                await engine.joinRoom(
                    currentToken,
                    currentRoomInfo.roomId,
                    { userId: currentRoomInfo.userId },
                    {
                        isAutoPublish: true,
                        isAutoSubscribeAudio: true,
                        isAutoSubscribeVideo: false,
                        roomProfileType: 0
                    }
                );

                statusLine(`
✅ RTC 连接成功！

连接详情:
- 房间ID: ${currentRoomInfo.roomId}
- 用户ID: ${currentRoomInfo.userId}
- 连接时间: ${new Date().toLocaleString()}

接下来可以:
1. 对着麦克风说话测试音频采集
2. 查看是否有远程用户加入
3. 测试发送文本消息`);

                resultEl.scrollTop = resultEl.scrollHeight;

                setTimeout(() => {
                    if (engine) {
                        engine.leaveRoom();
                        window.VERTC.destroyEngine(engine);
                        statusLine('\n\n🔌 已自动断开测试连接');
                    }
                    btn.disabled = false;
                    btn.textContent = '发起 RTC 连接';
                }, 5000);

                return;

            } catch (error) {
                showResult('connect-result',
`❌ RTC 连接失败！

错误: ${error.message}

可能原因:
1. Token 无效或已过期
2. AppID/AppKey 配置错误
3. 麦克风权限被拒绝
4. 房间已被销毁`, 'error');
            }

            btn.disabled = false;
            btn.textContent = '发起 RTC 连接';
        }
    </script>
</body>
</html>
